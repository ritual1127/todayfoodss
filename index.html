<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>순심여고 급식</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f7f6f2;--surface:#fff;--surface2:#f0efe9;--border:rgba(0,0,0,0.08);--text:#0e0e0c;--sub:#6b6b66;--hint:#c0bfb8;--blue:#1d6ef5;--blue-bg:#eef3ff;--blue-txt:#1244b0}
  [data-dark]{--bg:#0c0c0b;--surface:#181816;--surface2:#1f1f1c;--border:rgba(255,255,255,0.08);--text:#f2f2ee;--sub:#888880;--hint:#333330;--blue-bg:#0f1e3a;--blue-txt:#6b9fff}
  body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);max-width:440px;margin:0 auto;min-height:100vh;padding-bottom:60px}
  .header{padding:52px 20px 24px;display:flex;justify-content:space-between;align-items:center}
  .header-school{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sub);margin-bottom:4px}
  .header-title{font-size:26px;font-weight:900;letter-spacing:-.8px;line-height:1}
  .dark-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--surface);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .date-bar{margin:0 20px 18px;background:var(--surface);border-radius:18px;border:1px solid var(--border);padding:14px 16px}
  .date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .date-arrow{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .date-arrow:active{opacity:.5}
  .date-center{text-align:center}
  .date-main{font-size:17px;font-weight:700;letter-spacing:-.3px}
  .date-day{font-size:12px;color:var(--sub);margin-top:2px}
  .today-chip{display:inline-block;background:var(--blue-bg);color:var(--blue-txt);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
  .week{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .wday{border-radius:10px;padding:8px 0;text-align:center;cursor:pointer;background:var(--surface2);border:1.5px solid transparent;transition:all .15s}
  .wday .w{font-size:10px;font-weight:600;color:var(--sub);letter-spacing:.04em}
  .wday .d{font-size:17px;font-weight:700;margin-top:3px;letter-spacing:-.5px}
  .wday.is-today{border-color:var(--blue)}
  .wday.is-today .w,.wday.is-today .d{color:var(--blue)}
  .wday.sel{background:var(--text);border-color:var(--text)}
  .wday.sel .w{color:rgba(255,255,255,.55)}
  .wday.sel .d{color:#fff}
  [data-dark] .wday.sel .d{color:var(--bg)}
  [data-dark] .wday.sel .w{color:rgba(0,0,0,.45)}
  .meals{padding:0 20px}
  .meal-type-row{display:flex;align-items:center;gap:8px;margin:18px 0 8px 2px}
  .meal-type-icon{width:28px;height:28px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px}
  .meal-type-name{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}
  .meal-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden}
  .meal-item{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:12px}
  .meal-item:last-child{border-bottom:none}
  .meal-num{font-size:11px;font-weight:700;color:var(--hint);min-width:18px;text-align:right;flex-shrink:0}
  .meal-name{font-size:16px;font-weight:500;letter-spacing:-.2px;line-height:1.3}
  .state{padding:60px 20px;text-align:center;color:var(--sub);font-size:14px;line-height:1.8}
  .state-icon{font-size:40px;margin-bottom:12px}
  .spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--sub);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .share-row{display:flex;gap:8px;padding:14px 20px 0}
  .share-btn{flex:1;height:48px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;letter-spacing:-.2px}
  .share-btn:active{opacity:.5}
  .share-btn.fill{background:var(--text);color:var(--bg);border-color:var(--text)}
  .toast-wrap{position:fixed;bottom:32px;left:0;right:0;display:flex;justify-content:center;pointer-events:none;z-index:99}
  .toast{background:var(--text);color:var(--bg);padding:12px 24px;border-radius:28px;font-size:14px;font-weight:600;font-family:inherit;opacity:0;transform:translateY(8px);transition:all .25s;white-space:nowrap}
  .toast.show{opacity:1;transform:translateY(0)}
  .foot{text-align:center;padding:28px 20px 0;font-size:11px;color:var(--hint);letter-spacing:.04em}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-school">순심여자고등학교</div>
    <div class="header-title">오늘의 급식</div>
  </div>
  <button class="dark-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
</div>
<div class="date-bar">
  <div class="date-row">
    <button class="date-arrow" onclick="move(-1)">&#8249;</button>
    <div class="date-center">
      <div class="date-main" id="dateLabel"></div>
      <div class="date-day" id="dayLabel"></div>
    </div>
    <button class="date-arrow" onclick="move(1)">&#8250;</button>
  </div>
  <div class="week" id="week"></div>
</div>
<div class="meals" id="meals"></div>
<div class="share-row" id="shareRow" style="display:none">
  <button class="share-btn" onclick="copyMeal()">복사</button>
  <button class="share-btn fill" onclick="shareMeal()">공유하기 &rarr;</button>
</div>
<div class="foot">나이스 공식 데이터 · 실시간 연동</div>
<div class="toast-wrap"><div class="toast" id="toast"></div></div>
<script>
  const KEY='db8feffd37b74ab4bc5091be259069bd';
  const OFFICE='R10';
  const SCHOOL='8750183';
  const DOW=['일','월','화','수','목','금','토'];
  const ICONS={'1':'','2':'','3':''};
  const NAMES={'1':'조식','2':'중식','3':'석식'};

  const saved=localStorage.getItem('dk');
  if(saved==='1'||(!saved&&matchMedia('(prefers-color-scheme:dark)').matches))setDark(true);
  function setDark(v){v?document.body.setAttribute('data-dark',''):document.body.removeAttribute('data-dark');document.getElementById('darkBtn').textContent=v?'☀️':'🌙';}
  function toggleDark(){const on=document.body.hasAttribute('data-dark');setDark(!on);localStorage.setItem('dk',on?'0':'1');}

  let cur=new Date();
  const cache={};
  const pad=n=>String(n).padStart(2,'0');
  const fmt=d=>d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
  const isToday=d=>fmt(d)===fmt(new Date());
  const sameDay=(a,b)=>fmt(a)===fmt(b);

  function renderHeader(){
    document.getElementById('dateLabel').innerHTML=cur.getFullYear()+'년 '+(cur.getMonth()+1)+'월 '+cur.getDate()+'일'+(isToday(cur)?'<span class="today-chip">오늘</span>':'');
    document.getElementById('dayLabel').textContent=DOW[cur.getDay()]+'요일';
  }

  function renderWeek(){
    const dow=cur.getDay();
    const mon=new Date(cur);mon.setDate(cur.getDate()-(dow===0?6:dow-1));
    const el=document.getElementById('week');el.innerHTML='';
    for(let i=0;i<5;i++){
      const d=new Date(mon);d.setDate(mon.getDate()+i);
      const div=document.createElement('div');
      div.className='wday'+(isToday(d)?' is-today':'')+(sameDay(d,cur)?' sel':'');
      div.innerHTML='<div class="w">'+DOW[d.getDay()]+'</div><div class="d">'+d.getDate()+'</div>';
      div.onclick=()=>{cur=d;renderHeader();renderWeek();load();};
      el.appendChild(div);
    }
  }

  window.move=n=>{cur=new Date(cur);cur.setDate(cur.getDate()+n);renderHeader();renderWeek();load();};

  async function load(){
    const key=fmt(cur);
    const el=document.getElementById('meals');
    document.getElementById('shareRow').style.display='none';
    if(cache[key]){render(cache[key]);return;}
    el.innerHTML='<div class="state"><div class="spinner"></div>불러오는 중...</div>';
    try{
      const url='https://open.neis.go.kr/hub/mealServiceDietInfo?KEY='+KEY+'&Type=json&pIndex=1&pSize=10&ATPT_OFCDC_SC_CODE='+OFFICE+'&SD_SCHUL_CODE='+SCHOOL+'&MLSV_YMD='+key;
      const res=await fetch(url);
      const text=await res.text();
      const data=JSON.parse(text);
      if(data.mealServiceDietInfo){cache[key]=data.mealServiceDietInfo[1].row;render(cache[key]);}
      else if(data.RESULT&&data.RESULT.CODE==='INFO-200'){el.innerHTML='<div class="state"><div class="state-icon"></div>급식 정보가 없어요<br><span style="font-size:12px">주말이거나 방학일 수 있어요</span></div>';}
      else{el.innerHTML='<div class="state"><div class="state-icon"></div>'+(data.RESULT?data.RESULT.MESSAGE:'오류')+'</div>';}
    }catch(e){el.innerHTML='<div class="state"><div class="state-icon"></div>불러오기 실패<br><span style="font-size:12px">'+e.message+'</span></div>';}
  }

  function render(rows){
    document.getElementById('meals').innerHTML=rows.map(function(row){
      var code=row.MMEAL_SC_CODE;
      var items=row.DDISH_NM.replace(/<br\/>/g,'\n').replace(/<br>/g,'\n').split('\n').map(function(s){return s.replace(/\([\d.]+\)/g,'').trim();}).filter(Boolean);
      return '<div class="meal-type-row"><div class="meal-type-icon">'+(ICONS[code]||'🍽️')+'</div><div class="meal-type-name">'+(NAMES[code]||row.MMEAL_SC_NM)+'</div></div><div class="meal-card">'+items.map(function(item,i){return '<div class="meal-item"><span class="meal-num">'+(i+1)+'</span><span class="meal-name">'+item+'</span></div>';}).join('')+'</div>';
    }).join('');
    document.getElementById('shareRow').style.display='flex';
  }

  function getMealText(){
    var rows=cache[fmt(cur)];if(!rows)return'';
    var dateStr=cur.getFullYear()+'년 '+(cur.getMonth()+1)+'월 '+cur.getDate()+'일 '+DOW[cur.getDay()]+'요일';
    var lines=['순심여고 급식',dateStr,''];
    rows.forEach(function(row){
      lines.push('[ '+NAMES[row.MMEAL_SC_CODE]+' ]');
      row.DDISH_NM.replace(/<br\/>/g,'\n').replace(/<br>/g,'\n').split('\n').map(function(s){return s.replace(/\([\d.]+\)/g,'').trim();}).filter(Boolean).forEach(function(i){lines.push('• '+i);});
      lines.push('');
    });
    return lines.join('\n').trim();
  }

  window.copyMeal=function(){var t=getMealText();if(!t)return;navigator.clipboard.writeText(t).then(function(){toast('복사됐어요');});};
  window.shareMeal=async function(){
    var t=getMealText();if(!t)return;
    if(navigator.share){try{await navigator.share({title:'순심여고 급식',text:t});}catch(e){if(e.name!=='AbortError')toast('공유 실패');}}
    else{navigator.clipboard.writeText(t).then(function(){toast('복사됐어요');});}
  };

  function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

  renderHeader();renderWeek();load();
</script>
</body>
</html>
